; PlatformIO Project Configuration File for Team ЯTR Glider Avionics (RTR2026)
;
;   VSCode PlatformIO Sidebar will display these environments:
;   - RTR_Main_Board (Flash to ESP32-WROOM-32E Main Avionics)
;   - RTR_Pitot_Board (Flash to ESP32-WROOM-32E Pitot Tube sensor hub)
;   - RTR_Display_Board (Flash to ESP32-WROOM-32E Pre-flight Display)
;   - RTR_GPS_Board (Flash to ESP32-WROOM-32E GPS Board)
;   - RTR_Speaker_Board (Flash to ESP32-WROOM-32E Speaker Node)
;   - RTR_Altimeter_Board (Flash to ESP32-C3 Altimeter LiDAR/Ultrasonic)
;   - RTR_Rudder_Board (Flash to STM32F303 Rudder Angle Sensor)

[env]
monitor_speed = 115200

# Base configuration for ESP32-WROOM-32E nodes
[env_esp32]
platform = espressif32
board = esp32dev
framework = arduino
board_build.partitions = min_spiffs.csv

[env:RTR_Main_Board]
extends = env_esp32
build_flags = 
    -DNODE_MAIN
    -DCORE_DEBUG_LEVEL=3
build_src_filter = 
    +<*>
    -<main.cpp>
    -<udp_can_bridge.cpp>
    -<node_*.cpp>
    +<node_main.cpp>

[env:RTR_Pitot_Board]
extends = env_esp32
build_flags = 
    -DNODE_PITOT
    -DCORE_DEBUG_LEVEL=3
build_src_filter = 
    +<*>
    -<main.cpp>
    -<udp_can_bridge.cpp>
    -<node_*.cpp>
    +<node_pitot.cpp>

[env:RTR_Display_Board]
extends = env_esp32
build_flags = 
    -DNODE_DISPLAY
    -DCORE_DEBUG_LEVEL=3
build_src_filter = 
    +<*>
    -<main.cpp>
    -<udp_can_bridge.cpp>
    -<node_*.cpp>
    +<node_display.cpp>
lib_deps =
    adafruit/Adafruit ILI9341 @ ^1.6.0
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit BusIO @ ^1.16.1

[env:RTR_GPS_Board]
extends = env_esp32
build_flags = 
    -DNODE_GPS
    -DCORE_DEBUG_LEVEL=3
build_src_filter = 
    +<*>
    -<main.cpp>
    -<udp_can_bridge.cpp>
    -<node_*.cpp>
    +<node_gps.cpp>

[env:RTR_Speaker_Board]
extends = env_esp32
build_flags = 
    -DNODE_SPEAKER
    -DCORE_DEBUG_LEVEL=3
build_src_filter = 
    +<*>
    -<main.cpp>
    -<udp_can_bridge.cpp>
    -<node_*.cpp>
    +<node_speaker.cpp>

# Configuration for ESP32-C3 Altimeter Board
[env:RTR_Altimeter_Board]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
build_flags = 
    -DNODE_ALTIMETER
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
build_src_filter = 
    +<*>
    -<main.cpp>
    -<udp_can_bridge.cpp>
    -<node_*.cpp>
    +<node_altimeter.cpp>

# Configuration for STM32F303 Rudder Board
[env:RTR_Rudder_Board]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
build_flags = 
    -DNODE_RUDDER
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
build_src_filter = 
    +<*>
    -<main.cpp>
    -<udp_can_bridge.cpp>
    -<node_*.cpp>
    +<node_rudder.cpp>

# Configuration for UDP-CAN Bridge Node (Simulation interface)
[env:RTR_Sim_Bridge]
extends = env_esp32
build_flags = 
    -DNODE_SIM_BRIDGE
    -DCORE_DEBUG_LEVEL=3
build_src_filter = 
    -<*>
    +<udp_can_bridge.cpp>
lib_deps =
    https://github.com/sandeepmistry/arduino-CAN.git

# Configuration for ESP32-WROOM-32E Elevator Board (MPU6050 + Madgwick)
[env:RTR_Elevator_Board]
extends = env_esp32
build_flags =
    -DNODE_ELEVATOR
    -DCORE_DEBUG_LEVEL=3
build_src_filter =
    +<*>
    -<main.cpp>
    -<udp_can_bridge.cpp>
    -<node_*.cpp>
    +<node_elevator.cpp>
lib_deps =
    electroniccats/MPU6050 @ ^1.3.0
    https://github.com/arduino-libraries/MadgwickAHRS.git
